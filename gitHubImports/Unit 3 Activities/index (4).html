    <meta charset="UTF-8">

  <body>
    <script type="text/javascript">

        // Here we create our prompt and confirm variables which will store user input.
        var steak = confirm("Do you eat steak?");
        var steakSandwich = confirm("Here's a Steak Sandwich!");
        var steakSake = confirm("Here’s a Tofu Stir-Fry!");
        var sake = prompt("Are you over 20 years");

  
        // If the user likes sushi (confirmSushi === true), we run the following block of code.
        if (steak) {
          alert(steakSandwich);
        }
        
        // If neither of the previous condition were true, we run the following block of code.
        else {
          alert(steakSake);
        }
        if (sake) {
          alert("Niiiiice");
        }
        
        // If neither of the previous condition were true, we run the following block of code.
        else {
          alert("No Sake for you!");
        }
        
  
      </script>

  </body>
</html>
